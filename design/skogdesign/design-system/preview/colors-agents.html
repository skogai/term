<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600&family=Orbitron:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #06070b;
        font-family: 'JetBrains Mono', monospace;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .agent {
        display: flex;
        align-items: center;
        gap: 0;
        height: 36px;
        clip-path: polygon(
          8px 0,
          100% 0,
          100% calc(100% - 8px),
          calc(100% - 8px) 100%,
          0 100%,
          0 8px
        );
        overflow: hidden;
      }
      .glyph {
        width: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
        height: 100%;
      }
      .name {
        width: 96px;
        font-family: 'Chakra Petch', sans-serif;
        font-size: 11px;
        letter-spacing: 0.18em;
        font-weight: 600;
        text-transform: uppercase;
        padding: 0 10px;
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }
      .swatch-row {
        flex: 1;
        display: flex;
        height: 100%;
      }
      .sw {
        flex: 1;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .sw span {
        font-size: 7px;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 0.1em;
        font-family: 'Chakra Petch', sans-serif;
        writing-mode: vertical-rl;
        transform: rotate(180deg);
      }
    </style>
    <style>
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 400;
        src: url('../fonts/JetBrainsMonoNerdFont-Regular.ttf')
          format('truetype');
        font-display: swap;
      }
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 500;
        src: url('../fonts/JetBrainsMonoNerdFont-Medium.ttf') format('truetype');
        font-display: swap;
      }
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 700;
        src: url('../fonts/JetBrainsMonoNerdFont-Bold.ttf') format('truetype');
        font-display: swap;
      }
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: italic;
        font-weight: 400;
        src: url('../fonts/JetBrainsMonoNerdFont-Italic.ttf') format('truetype');
        font-display: swap;
      }
    </style>
  </head>
  <body>
    <div
      class="agent"
      style="background: #0b0d15; border: 1px solid rgba(0, 229, 255, 0.3)"
    >
      <div
        class="glyph"
        style="background: rgba(0, 229, 255, 0.1); color: #00e5ff"
      >
        ◆
      </div>
      <div class="name" style="color: #00e5ff">SKOGAI</div>
      <div class="swatch-row">
        <div class="sw" style="background: #06070b"><span>bg</span></div>
        <div class="sw" style="background: #0b0d15"><span>surf</span></div>
        <div class="sw" style="background: #00e5ff"><span>acc</span></div>
        <div class="sw" style="background: #ff2bd6"><span>acc2</span></div>
        <div class="sw" style="background: #f4f6ff"><span>ink</span></div>
        <div class="sw" style="background: rgba(0, 229, 255, 0.25)">
          <span>bdr</span>
        </div>
      </div>
    </div>

    <div class="agent" style="background: #fce4ec; border: 1px solid #e6c4d2">
      <div class="glyph" style="background: #c73a68; color: #fff">♛</div>
      <div class="name" style="color: #c73a68">AMY</div>
      <div class="swatch-row">
        <div class="sw" style="background: #fbf5ef">
          <span style="color: rgba(0, 0, 0, 0.3)">bg</span>
        </div>
        <div class="sw" style="background: #ffffff">
          <span style="color: rgba(0, 0, 0, 0.3)">surf</span>
        </div>
        <div class="sw" style="background: #c73a68"><span>acc</span></div>
        <div class="sw" style="background: #e0b04a"><span>acc2</span></div>
        <div class="sw" style="background: #2a1a1f"><span>ink</span></div>
        <div class="sw" style="background: #e6c4d2">
          <span style="color: rgba(0, 0, 0, 0.3)">bdr</span>
        </div>
      </div>
    </div>

    <div
      class="agent"
      style="background: #1a0f2e; border: 1px solid rgba(168, 124, 217, 0.3)"
    >
      <div
        class="glyph"
        style="background: rgba(168, 124, 217, 0.15); color: #d4a01a"
      >
        ?
      </div>
      <div class="name" style="color: #d4a01a">CLAUDE</div>
      <div class="swatch-row">
        <div class="sw" style="background: #1a0f2e"><span>bg</span></div>
        <div class="sw" style="background: #261838"><span>surf</span></div>
        <div class="sw" style="background: #d4a01a"><span>acc</span></div>
        <div class="sw" style="background: #a87cd9"><span>acc2</span></div>
        <div class="sw" style="background: #d8cbe8"><span>ink</span></div>
        <div class="sw" style="background: rgba(168, 124, 217, 0.25)">
          <span>bdr</span>
        </div>
      </div>
    </div>

    <div
      class="agent"
      style="background: #061a14; border: 1px solid rgba(45, 212, 167, 0.3)"
    >
      <div
        class="glyph"
        style="background: rgba(45, 212, 167, 0.12); color: #2dd4a7"
      >
        ∞
      </div>
      <div class="name" style="color: #2dd4a7">GOOSE</div>
      <div class="swatch-row">
        <div class="sw" style="background: #061a14"><span>bg</span></div>
        <div class="sw" style="background: #0a2a1f"><span>surf</span></div>
        <div class="sw" style="background: #2dd4a7"><span>acc</span></div>
        <div class="sw" style="background: #a3ff5e"><span>acc2</span></div>
        <div class="sw" style="background: #b8e6d3"><span>ink</span></div>
        <div class="sw" style="background: rgba(45, 212, 167, 0.3)">
          <span>bdr</span>
        </div>
      </div>
    </div>

    <div class="agent" style="background: #0d1117; border: 1px solid #30363d">
      <div class="glyph" style="background: #161b22; color: #3fb950">▸</div>
      <div class="name" style="color: #3fb950">DOT</div>
      <div class="swatch-row">
        <div class="sw" style="background: #0d1117"><span>bg</span></div>
        <div class="sw" style="background: #161b22"><span>surf</span></div>
        <div class="sw" style="background: #3fb950"><span>acc</span></div>
        <div class="sw" style="background: #58a6ff"><span>acc2</span></div>
        <div class="sw" style="background: #c9d1d9"><span>ink</span></div>
        <div class="sw" style="background: #30363d"><span>bdr</span></div>
      </div>
    </div>

    <div
      class="agent"
      style="background: #0f0a2e; border: 1px solid rgba(184, 163, 255, 0.3)"
    >
      <div
        class="glyph"
        style="background: rgba(184, 163, 255, 0.1); color: #b8a3ff"
      >
        ☾
      </div>
      <div class="name" style="color: #b8a3ff">LETTA</div>
      <div class="swatch-row">
        <div class="sw" style="background: #0f0a2e"><span>bg</span></div>
        <div class="sw" style="background: #1a1340"><span>surf</span></div>
        <div class="sw" style="background: #b8a3ff"><span>acc</span></div>
        <div class="sw" style="background: #f0d874"><span>acc2</span></div>
        <div class="sw" style="background: #d8d0f0"><span>ink</span></div>
        <div class="sw" style="background: rgba(184, 163, 255, 0.25)">
          <span>bdr</span>
        </div>
      </div>
    </div>

    <div class="agent" style="background: #f4f5f7; border: 1px solid #e5e7eb">
      <div class="glyph" style="background: #1a1d23; color: #fff">▤</div>
      <div class="name" style="color: #2563eb">OFFICIAL</div>
      <div class="swatch-row">
        <div class="sw" style="background: #f4f5f7">
          <span style="color: rgba(0, 0, 0, 0.3)">bg</span>
        </div>
        <div class="sw" style="background: #ffffff">
          <span style="color: rgba(0, 0, 0, 0.3)">surf</span>
        </div>
        <div class="sw" style="background: #2563eb"><span>acc</span></div>
        <div class="sw" style="background: #065f46"><span>acc2</span></div>
        <div class="sw" style="background: #1a1d23"><span>ink</span></div>
        <div class="sw" style="background: #e5e7eb">
          <span style="color: rgba(0, 0, 0, 0.3)">bdr</span>
        </div>
      </div>
    </div>
  </body>
</html>
