<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #06070b;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .bar {
        background: linear-gradient(90deg, #00e5ff, rgba(0, 229, 255, 0.3));
        height: 14px;
      }
      .name {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        color: #545970;
        width: 70px;
        flex-shrink: 0;
        letter-spacing: 0.08em;
      }
      .val {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        color: #8a8fa8;
        width: 36px;
        flex-shrink: 0;
      }
    </style>
    <style>
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 400;
        src: url('../fonts/JetBrainsMonoNerdFont-Regular.ttf')
          format('truetype');
        font-display: swap;
      }
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 500;
        src: url('../fonts/JetBrainsMonoNerdFont-Medium.ttf') format('truetype');
        font-display: swap;
      }
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 700;
        src: url('../fonts/JetBrainsMonoNerdFont-Bold.ttf') format('truetype');
        font-display: swap;
      }
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: italic;
        font-weight: 400;
        src: url('../fonts/JetBrainsMonoNerdFont-Italic.ttf') format('truetype');
        font-display: swap;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <span class="name">--space-1</span>
      <div class="bar" style="width: 4px"></div>
      <span class="val">4px</span>
    </div>
    <div class="row">
      <span class="name">--space-2</span>
      <div class="bar" style="width: 8px"></div>
      <span class="val">8px</span>
    </div>
    <div class="row">
      <span class="name">--space-3</span>
      <div class="bar" style="width: 12px"></div>
      <span class="val">12px</span>
    </div>
    <div class="row">
      <span class="name">--space-4</span>
      <div class="bar" style="width: 16px"></div>
      <span class="val">16px</span>
    </div>
    <div class="row">
      <span class="name">--space-5</span>
      <div class="bar" style="width: 24px"></div>
      <span class="val">24px</span>
    </div>
    <div class="row">
      <span class="name">--space-6</span>
      <div class="bar" style="width: 32px"></div>
      <span class="val">32px</span>
    </div>
    <div class="row">
      <span class="name">--space-7</span>
      <div class="bar" style="width: 48px"></div>
      <span class="val">48px</span>
    </div>
    <div class="row">
      <span class="name">--space-8</span>
      <div class="bar" style="width: 64px"></div>
      <span class="val">64px</span>
    </div>
    <div class="row">
      <span class="name">--space-9</span>
      <div class="bar" style="width: 96px"></div>
      <span class="val">96px</span>
    </div>
  </body>
</html>
