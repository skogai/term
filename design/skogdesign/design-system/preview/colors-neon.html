<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #06070b;
        font-family: 'JetBrains Mono', monospace;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .group {
        display: flex;
        gap: 6px;
        align-items: stretch;
      }
      .swatch {
        flex: 1;
        height: 52px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 5px 7px;
        position: relative;
      }
      .swatch .lbl {
        font-size: 9px;
        letter-spacing: 0.12em;
        color: rgba(0, 0, 0, 0.7);
        font-family: 'Chakra Petch', sans-serif;
        text-transform: uppercase;
        font-weight: 600;
      }
      .swatch .hex {
        font-size: 8px;
        color: rgba(0, 0, 0, 0.45);
        margin-top: 1px;
      }
      .swatch.dim .lbl,
      .swatch.dim .hex {
        color: rgba(255, 255, 255, 0.55);
      }
      .swatch.glow-c {
        box-shadow:
          0 0 0 1px rgba(0, 229, 255, 0.8),
          0 0 20px rgba(0, 229, 255, 0.6);
      }
      .swatch.glow-m {
        box-shadow:
          0 0 0 1px rgba(255, 43, 214, 0.8),
          0 0 20px rgba(255, 43, 214, 0.6);
      }
      .tag {
        font-size: 9px;
        color: #545970;
        letter-spacing: 0.18em;
        font-family: 'Chakra Petch', sans-serif;
        text-transform: uppercase;
        margin-bottom: 2px;
      }
    </style>
    <style>
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 400;
        src: url('../fonts/JetBrainsMonoNerdFont-Regular.ttf')
          format('truetype');
        font-display: swap;
      }
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 500;
        src: url('../fonts/JetBrainsMonoNerdFont-Medium.ttf') format('truetype');
        font-display: swap;
      }
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 700;
        src: url('../fonts/JetBrainsMonoNerdFont-Bold.ttf') format('truetype');
        font-display: swap;
      }
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: italic;
        font-weight: 400;
        src: url('../fonts/JetBrainsMonoNerdFont-Italic.ttf') format('truetype');
        font-display: swap;
      }
    </style>
  </head>
  <body>
    <div class="tag">NEON ACCENTS</div>
    <div class="group">
      <div class="swatch glow-c" style="background: #00e5ff">
        <span class="lbl">cyan</span><span class="hex">#00e5ff</span>
      </div>
      <div class="swatch dim" style="background: #0891a8">
        <span class="lbl">cyan-dim</span><span class="hex">#0891a8</span>
      </div>
      <div class="swatch" style="background: #7ff6ff">
        <span class="lbl">cyan-glow</span><span class="hex">#7ff6ff</span>
      </div>
      <div class="swatch glow-m" style="background: #ff2bd6">
        <span class="lbl">magenta</span><span class="hex">#ff2bd6</span>
      </div>
      <div class="swatch dim" style="background: #a81689">
        <span class="lbl">mag-dim</span><span class="hex">#a81689</span>
      </div>
      <div class="swatch" style="background: #ff8aea">
        <span class="lbl">mag-glow</span><span class="hex">#ff8aea</span>
      </div>
    </div>
    <div class="group" style="margin-top: 6px">
      <div class="swatch" style="background: #f2ff00">
        <span class="lbl">hazard</span><span class="hex">#f2ff00</span>
      </div>
      <div class="swatch dim" style="background: #9ca800">
        <span class="lbl">haz-dim</span><span class="hex">#9ca800</span>
      </div>
      <div
        class="swatch"
        style="
          background: #ff2d4a;
          box-shadow:
            0 0 0 1px rgba(255, 45, 74, 0.8),
            0 0 16px rgba(255, 45, 74, 0.5);
        "
      >
        <span class="lbl">blood</span><span class="hex">#ff2d4a</span>
      </div>
      <div class="swatch dim" style="background: #a3121f">
        <span class="lbl">blood-dim</span><span class="hex">#a3121f</span>
      </div>
      <div
        class="swatch"
        style="
          background: #39ff88;
          box-shadow:
            0 0 0 1px rgba(57, 255, 136, 0.8),
            0 0 16px rgba(57, 255, 136, 0.5);
        "
      >
        <span class="lbl">acid</span><span class="hex">#39ff88</span>
      </div>
      <div class="swatch dim" style="background: #129e48">
        <span class="lbl">acid-dim</span><span class="hex">#129e48</span>
      </div>
    </div>
    <div class="group" style="margin-top: 6px; height: 28px">
      <div
        style="
          flex: 1;
          background: linear-gradient(135deg, #00e5ff, #ff2bd6);
          display: flex;
          align-items: center;
          padding: 0 8px;
        "
      >
        <span
          style="
            font-size: 9px;
            color: #000;
            font-family: 'Chakra Petch', sans-serif;
            letter-spacing: 0.12em;
            font-weight: 600;
          "
          >DUALITY GRADIENT</span
        >
      </div>
      <div
        style="
          flex: 1;
          background: linear-gradient(90deg, #f2ff00, #ff2d4a);
          display: flex;
          align-items: center;
          padding: 0 8px;
        "
      >
        <span
          style="
            font-size: 9px;
            color: #000;
            font-family: 'Chakra Petch', sans-serif;
            letter-spacing: 0.12em;
            font-weight: 600;
          "
          >HAZARD GRADIENT</span
        >
      </div>
    </div>
  </body>
</html>
