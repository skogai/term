<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Type · body + mono</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div
        style="
          width: 100%;
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 24px;
        "
      >
        <div>
          <div class="label-xs" style="color: var(--cyan)">
            // RAJDHANI · BODY
          </div>
          <div
            style="
              font-family: var(--font-body);
              font-size: 17px;
              line-height: 1.45;
              color: var(--fg-1);
              margin-top: 8px;
            "
          >
            Autonomous agents running on your hardware. Private compute, zero
            cold starts.
          </div>
        </div>
        <div>
          <div class="label-xs" style="color: var(--magenta)">
            // JETBRAINS MONO
          </div>
          <div
            class="mono"
            style="font-size: 13px; color: var(--cyan-glow); margin-top: 8px"
          >
            $ skogai run --agent dot<br />[47 nodes online] · 40ms
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
