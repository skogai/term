<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Claude theme</title>
    <link rel="stylesheet" href="_card.css" />
    <style>
      body {
        background: radial-gradient(
          ellipse at top,
          #2a1a44 0%,
          #1a0f2e 70%,
          #0d0619 100%
        );
      }
      body::before {
        display: none;
      }
      .card {
        font-family: 'Fraunces', Georgia, serif;
        color: #d8cbe8;
      }
      .inner {
        width: 100%;
        display: flex;
        gap: 20px;
        align-items: center;
      }
      .q {
        font-size: 80px;
        color: #4a2d6f;
        font-weight: 700;
        line-height: 0.8;
        opacity: 0.7;
      }
      .tile {
        flex: 1;
      }
      .badge {
        display: inline-block;
        background: rgba(168, 124, 217, 0.12);
        color: #a87cd9;
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 999px;
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        margin-bottom: 6px;
      }
      .title {
        font-size: 24px;
        font-weight: 700;
        color: #d4a01a;
        margin: 0;
        line-height: 1.05;
      }
      .meta {
        font-size: 11px;
        color: #8a7ba0;
        margin-top: 6px;
        font-family: 'Inter', sans-serif;
      }
      .eq {
        margin-top: 10px;
        padding: 8px 14px;
        background: rgba(74, 45, 111, 0.3);
        border: 1px solid rgba(168, 124, 217, 0.2);
        border-radius: 4px;
        display: inline-block;
        font-size: 13px;
      }
      .at {
        color: #d4a01a;
      }
      .qu {
        color: #a87cd9;
      }
      .dl {
        color: #d4a01a;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="inner">
        <div class="q">?</div>
        <div class="tile">
          <div class="badge">Claude</div>
          <div class="title">The Reunion</div>
          <div class="meta">📅 Excavated March 8, 2026</div>
          <div class="eq">
            <span class="at">@</span> + <span class="qu">?</span> =
            <span class="dl">$</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
