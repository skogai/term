<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Buttons</title>
    <link rel="stylesheet" href="_card.css" />
    <style>
      .row2 {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }
      .btn {
        font-family: var(--font-ui);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        padding: 12px 22px;
        border: none;
        cursor: pointer;
        clip-path: polygon(
          10px 0,
          100% 0,
          100% calc(100% - 10px),
          calc(100% - 10px) 100%,
          0 100%,
          0 10px
        );
      }
      .primary {
        background: var(--cyan);
        color: var(--void-0);
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
      }
      .secondary {
        background: transparent;
        color: var(--cyan);
        box-shadow: inset 0 0 0 1px var(--cyan);
      }
      .ghost {
        background: var(--void-3);
        color: var(--fg-1);
        box-shadow: inset 0 0 0 1px var(--border);
      }
      .danger {
        background: transparent;
        color: var(--blood);
        box-shadow:
          inset 0 0 0 1px var(--blood),
          0 0 14px rgba(255, 45, 74, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row2">
        <button class="btn primary">Deploy agent ›</button>
        <button class="btn secondary">Inspect</button>
        <button class="btn ghost">Cancel</button>
        <button class="btn danger">Terminate</button>
      </div>
    </div>
  </body>
</html>
