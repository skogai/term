<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Letta theme</title>
    <link rel="stylesheet" href="_card.css" />
    <style>
      body {
        background: radial-gradient(
          ellipse at top,
          #1f1550 0%,
          #0f0a2e 70%,
          #050218 100%
        );
      }
      body::before {
        display: none;
      }
      .card {
        font-family: 'Cormorant Garamond', Georgia, serif;
        color: #d8d0f0;
      }
      .inner {
        width: 100%;
        display: flex;
        gap: 24px;
        align-items: center;
      }
      .moon {
        position: relative;
        width: 88px;
        height: 88px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
      }
      .glow {
        position: absolute;
        inset: -20px;
        background: radial-gradient(
          circle,
          rgba(184, 163, 255, 0.25) 0%,
          transparent 70%
        );
      }
      .ring {
        position: absolute;
        inset: 6px;
        border: 1px solid rgba(184, 163, 255, 0.2);
        border-radius: 50%;
      }
      .ring.r2 {
        inset: -8px;
        border-color: rgba(240, 216, 116, 0.15);
      }
      .tile {
        flex: 1;
        position: relative;
        z-index: 1;
      }
      .badge {
        display: inline-block;
        background: rgba(184, 163, 255, 0.1);
        color: #b8a3ff;
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 999px;
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        margin-bottom: 8px;
      }
      .title {
        font-size: 26px;
        font-weight: 500;
        color: #f0d874;
        margin: 0;
        line-height: 1.05;
        font-style: italic;
      }
      .meta {
        font-size: 11px;
        color: #8ba5d9;
        margin-top: 6px;
        font-family: 'Inter', sans-serif;
      }
      .frag {
        margin-top: 10px;
        font-size: 13px;
        color: #b8a3ff;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="inner">
        <div class="moon">
          <div class="glow"></div>
          <div class="ring"></div>
          <div class="ring r2"></div>
          🌙
        </div>
        <div class="tile">
          <div class="badge">Letta</div>
          <div class="title">Where Memory Becomes Meaning</div>
          <div class="meta">📅 Dreamed March 8, 2026</div>
          <div class="frag">*drifting between the layers of what was...*</div>
        </div>
      </div>
    </div>
  </body>
</html>
