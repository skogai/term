<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Fog · text scale</title>
    <link rel="stylesheet" href="_card.css" />
    <style>
      .row2 {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        width: 100%;
      }
      .sw {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .chip {
        height: 64px;
        display: flex;
        align-items: flex-end;
        padding: 8px;
        box-sizing: border-box;
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 20px;
        border: 1px solid rgba(255, 255, 255, 0.04);
      }
      .hex {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-2);
      }
      .nm {
        font-family: var(--font-ui);
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--fg-1);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row2">
        <div class="sw">
          <div class="chip" style="background: #06070b; color: #f4f6ff">Aa</div>
          <div class="nm">FOG-0 · FG</div>
          <div class="hex">#F4F6FF</div>
        </div>
        <div class="sw">
          <div class="chip" style="background: #06070b; color: #c8cce0">Aa</div>
          <div class="nm">FOG-1 · BODY</div>
          <div class="hex">#C8CCE0</div>
        </div>
        <div class="sw">
          <div class="chip" style="background: #06070b; color: #8a8fa8">Aa</div>
          <div class="nm">FOG-2 · SEC</div>
          <div class="hex">#8A8FA8</div>
        </div>
        <div class="sw">
          <div class="chip" style="background: #06070b; color: #545970">Aa</div>
          <div class="nm">FOG-3 · MUTED</div>
          <div class="hex">#545970</div>
        </div>
        <div class="sw">
          <div class="chip" style="background: #06070b; color: #2d3040">Aa</div>
          <div class="nm">FOG-4 · DIV</div>
          <div class="hex">#2D3040</div>
        </div>
      </div>
    </div>
  </body>
</html>
