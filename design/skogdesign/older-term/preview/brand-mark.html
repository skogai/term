<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Brand mark</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div style="display: flex; align-items: center; gap: 28px; width: 100%">
        <img
          src="../assets/skogai-logo-mask.png"
          alt="skogai"
          style="
            width: 120px;
            height: 120px;
            object-fit: cover;
            clip-path: polygon(
              12px 0,
              100% 0,
              100% calc(100% - 12px),
              calc(100% - 12px) 100%,
              0 100%,
              0 12px
            );
            box-shadow:
              0 0 0 1px rgba(0, 229, 255, 0.5),
              0 0 24px rgba(0, 229, 255, 0.25);
          "
        />
        <div class="col" style="gap: 6px">
          <div class="label-xs" style="color: var(--cyan)">// PRIMARY MARK</div>
          <div
            class="display"
            style="
              font-size: 40px;
              font-weight: 900;
              letter-spacing: 0.06em;
              line-height: 1;
            "
          >
            <span style="color: var(--fg)">SKOG</span
            ><span style="color: var(--cyan)">AI</span>
          </div>
          <div
            class="mono"
            style="font-size: 11px; color: var(--fg-2); letter-spacing: 0.18em"
          >
            AUTONOMOUS AGENTS · PRIVATE COMPUTE
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
