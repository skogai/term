<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Official theme</title>
    <link rel="stylesheet" href="_card.css" />
    <style>
      body {
        background: #f4f5f7;
      }
      body::before {
        display: none;
      }
      .card {
        font-family: 'Inter', system-ui, sans-serif;
        color: #1a1d23;
      }
      .doc {
        width: 100%;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 4px;
        overflow: hidden;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
      }
      .header {
        background: #1a1d23;
        color: #fff;
        padding: 10px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        letter-spacing: 0.08em;
      }
      .shield {
        width: 16px;
        height: 16px;
        border-radius: 2px;
        background: #2563eb;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
      }
      .body {
        padding: 14px 18px;
      }
      .meta-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        font-size: 10px;
        margin-bottom: 10px;
      }
      .meta-k {
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .meta-v {
        color: #1a1d23;
        font-weight: 600;
        margin-top: 2px;
      }
      .title {
        font-size: 20px;
        font-weight: 700;
        margin: 0;
      }
      .st {
        display: inline-block;
        background: #d1fae5;
        color: #065f46;
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="doc">
        <div class="header">
          <span class="shield">🛡</span>OFFICIAL DOCUMENTATION · GOVERNANCE
        </div>
        <div class="body">
          <div class="meta-grid">
            <div>
              <div class="meta-k">Date</div>
              <div class="meta-v">2026-03-08</div>
            </div>
            <div>
              <div class="meta-k">Authority</div>
              <div class="meta-v">Dictator</div>
            </div>
            <div>
              <div class="meta-k">Status</div>
              <div class="meta-v"><span class="st">RATIFIED</span></div>
            </div>
            <div>
              <div class="meta-k">Env</div>
              <div class="meta-v">Production</div>
            </div>
          </div>
          <div class="title">Memory Block Governance Decision 47</div>
        </div>
      </div>
    </div>
  </body>
</html>
