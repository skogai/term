<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Voids · surface scale</title>
    <link rel="stylesheet" href="_card.css" />
    <style>
      .row2 {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 10px;
        width: 100%;
      }
      .sw {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .chip {
        height: 64px;
        border: 1px solid rgba(255, 255, 255, 0.04);
      }
      .hex {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-2);
        letter-spacing: 0.06em;
      }
      .nm {
        font-family: var(--font-ui);
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--fg-1);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row2">
        <div class="sw">
          <div class="chip" style="background: #000000"></div>
          <div class="nm">VOID-0</div>
          <div class="hex">#000000</div>
        </div>
        <div class="sw">
          <div class="chip" style="background: #06070b"></div>
          <div class="nm">VOID-1 · BG</div>
          <div class="hex">#06070B</div>
        </div>
        <div class="sw">
          <div class="chip" style="background: #0b0d15"></div>
          <div class="nm">VOID-2</div>
          <div class="hex">#0B0D15</div>
        </div>
        <div class="sw">
          <div class="chip" style="background: #121521"></div>
          <div class="nm">VOID-3</div>
          <div class="hex">#121521</div>
        </div>
        <div class="sw">
          <div class="chip" style="background: #1b1f30"></div>
          <div class="nm">VOID-4</div>
          <div class="hex">#1B1F30</div>
        </div>
        <div class="sw">
          <div class="chip" style="background: #262a3d"></div>
          <div class="nm">VOID-5</div>
          <div class="hex">#262A3D</div>
        </div>
      </div>
    </div>
  </body>
</html>
