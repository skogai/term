<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Semantic state colors</title>
    <link rel="stylesheet" href="_card.css" />
    <style>
      .row2 {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        width: 100%;
      }
      .card2 {
        padding: 14px;
        background: var(--void-2);
        border: 1px solid var(--border);
        clip-path: polygon(
          8px 0,
          100% 0,
          100% calc(100% - 8px),
          calc(100% - 8px) 100%,
          0 100%,
          0 8px
        );
      }
      .dot {
        width: 10px;
        height: 10px;
        display: inline-block;
        margin-right: 8px;
        vertical-align: middle;
      }
      .nm {
        font-family: var(--font-ui);
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 600;
      }
      .hex {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-2);
        margin-top: 6px;
        letter-spacing: 0.08em;
      }
      .lbl {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--fg-3);
        letter-spacing: 0.2em;
        margin-top: 10px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row2">
        <div class="card2">
          <div>
            <span
              class="dot"
              style="background: #00e5ff; box-shadow: 0 0 10px #00e5ff"
            ></span
            ><span class="nm" style="color: #00e5ff">INFO</span>
          </div>
          <div class="lbl">Active · focus · agent</div>
          <div class="hex">#00E5FF</div>
        </div>
        <div class="card2">
          <div>
            <span
              class="dot"
              style="background: #39ff88; box-shadow: 0 0 10px #39ff88"
            ></span
            ><span class="nm" style="color: #39ff88">ONLINE</span>
          </div>
          <div class="lbl">Success · ready</div>
          <div class="hex">#39FF88</div>
        </div>
        <div class="card2">
          <div>
            <span
              class="dot"
              style="background: #f2ff00; box-shadow: 0 0 10px #f2ff00"
            ></span
            ><span class="nm" style="color: #f2ff00">WARN</span>
          </div>
          <div class="lbl">Hazard · attention</div>
          <div class="hex">#F2FF00</div>
        </div>
        <div class="card2">
          <div>
            <span
              class="dot"
              style="background: #ff2d4a; box-shadow: 0 0 10px #ff2d4a"
            ></span
            ><span class="nm" style="color: #ff2d4a">ERROR</span>
          </div>
          <div class="lbl">Danger · offline</div>
          <div class="hex">#FF2D4A</div>
        </div>
      </div>
    </div>
  </body>
</html>
