<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Spacing scale</title>
    <link rel="stylesheet" href="_card.css" />
    <style>
      .row2 {
        display: flex;
        align-items: flex-end;
        gap: 14px;
        width: 100%;
      }
      .blk {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .bar {
        background: var(--cyan);
        box-shadow: 0 0 12px rgba(0, 229, 255, 0.35);
        width: 32px;
      }
      .val {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-2);
        letter-spacing: 0.1em;
      }
      .nm {
        font-family: var(--font-ui);
        font-size: 10px;
        color: var(--fg-1);
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row2">
        <div class="blk">
          <div class="bar" style="height: 4px"></div>
          <div class="nm">1</div>
          <div class="val">4</div>
        </div>
        <div class="blk">
          <div class="bar" style="height: 8px"></div>
          <div class="nm">2</div>
          <div class="val">8</div>
        </div>
        <div class="blk">
          <div class="bar" style="height: 12px"></div>
          <div class="nm">3</div>
          <div class="val">12</div>
        </div>
        <div class="blk">
          <div class="bar" style="height: 16px"></div>
          <div class="nm">4</div>
          <div class="val">16</div>
        </div>
        <div class="blk">
          <div class="bar" style="height: 24px"></div>
          <div class="nm">5</div>
          <div class="val">24</div>
        </div>
        <div class="blk">
          <div class="bar" style="height: 32px"></div>
          <div class="nm">6</div>
          <div class="val">32</div>
        </div>
        <div class="blk">
          <div class="bar" style="height: 48px"></div>
          <div class="nm">7</div>
          <div class="val">48</div>
        </div>
        <div class="blk">
          <div class="bar" style="height: 64px"></div>
          <div class="nm">8</div>
          <div class="val">64</div>
        </div>
        <div class="blk">
          <div class="bar" style="height: 96px"></div>
          <div class="nm">9</div>
          <div class="val">96</div>
        </div>
      </div>
    </div>
  </body>
</html>
