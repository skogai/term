<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shellscape</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="screen">
      <!-- ── TOP BAR ── -->
      <div id="topbar">
        <span class="title glitch">SHELLSCAPE v2.3</span>
        <span class="status" id="level-badge">NOT CONNECTED</span>
        <span class="clock" id="clock">00:00:00</span>
      </div>

      <!-- ── PROGRESS ── -->
      <div id="progress-bar">
        <div id="progress-fill" style="width: 0%"></div>
      </div>

      <!-- ── OUTPUT ── -->
      <div id="terminal"></div>

      <!-- ── INPUT ROW ── -->
      <div id="input-area">
        <span id="prompt-label">
          <span id="prompt-user">guest</span><span class="at">@</span
          ><span id="prompt-host" class="host">shellscape</span
          ><span class="dollar">:~$&nbsp;</span>
        </span>

        <div id="input-wrapper">
          <span id="input-mirror"></span>
          <input
            id="cmd-input"
            type="text"
            autocomplete="off"
            spellcheck="false"
            autofocus
          />
        </div>

        <span id="tab-hint"></span>
      </div>
    </div>

    <canvas
      id="badge-canvas"
      width="512"
      height="512"
      style="display: none"
    ></canvas>

    <!-- JS load order matters: levels → commands → engine → terminal -->
    <script src="levels.js"></script>
    <script src="commands.js"></script>
    <script src="engine.js"></script>
    <script src="terminal.js"></script>
  </body>
</html>
